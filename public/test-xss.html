<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Teste XSS — DOMPurify</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 24px;
      background: #f5f7fa;
      color: #222;
    }
    h1 {
      font-size: 1.4rem;
      color: #1F3864;
      border-bottom: 2px solid #1F3864;
      padding-bottom: 8px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: bold;
      color: #555;
      margin-bottom: 4px;
      margin-top: 16px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
      box-sizing: border-box;
      font-family: 'Courier New', monospace;
    }
    button {
      margin-top: 20px;
      padding: 10px 28px;
      background: #1F3864;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    button:hover { background: #2E75B6; }

    #result {
      margin-top: 32px;
      display: none;
    }
    #result h2 {
      font-size: 1rem;
      color: #333;
      margin-bottom: 8px;
    }

    .box {
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }
    .box-raw {
      background: #fff3cd;
      border: 1px solid #ffc107;
    }
    .box-raw h3 { margin: 0 0 6px 0; font-size: 0.82rem; color: #7a5c00; text-transform: uppercase; }
    .box-sanitized {
      background: #d4edda;
      border: 1px solid #28a745;
    }
    .box-sanitized h3 { margin: 0 0 6px 0; font-size: 0.82rem; color: #155724; text-transform: uppercase; }

    .raw-content {
      font-family: 'Courier New', monospace;
      word-break: break-all;
      color: #333;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-left: 8px;
    }
    .badge-blocked { background: #28a745; color: white; }
    .badge-raw     { background: #ffc107; color: #333; }

    #error-msg {
      color: #c0392b;
      font-size: 0.88rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🔒 Demonstração XSS + DOMPurify</h1>

  <label for="token">Access Token (colar do Postman)</label>
  <input type="text" id="token" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">

  <label for="secretId">ID do Segredo</label>
  <input type="number" id="secretId" placeholder="ex: 5" style="width: 120px;">

  <button onclick="fetchSecret()">Buscar e Sanitizar</button>

  <div id="error-msg"></div>

  <div id="result">
    <div class="box box-raw">
      <h3>⚠️ Conteúdo raw da API <span class="badge badge-raw">NÃO renderizado</span></h3>
      <div class="raw-content" id="raw-output"></div>
    </div>

    <div class="box box-sanitized">
      <h3>✅ Após DOMPurify.sanitize() <span class="badge badge-blocked">Script bloqueado</span></h3>
      <div id="sanitized-output"></div>
      <div style="margin-top:8px; font-size:0.82rem; color:#555;">
        (Se o conteúdo estiver vazio, o DOMPurify removeu toda a tag maliciosa)
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
  <script>
    async function fetchSecret() {
      const token = document.getElementById('token').value.trim();
      const id    = document.getElementById('secretId').value.trim();
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!token || !id) {
        errEl.textContent = 'Por favor preenche o token e o ID do segredo.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch(`http://localhost:3000/secrets/${id}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          const err = await res.json();
          errEl.textContent = `Erro ${res.status}: ${err.error || 'Pedido falhou'}`;
          errEl.style.display = 'block';
          return;
        }

        const data = await res.json();
        const rawContent = data.content;

        // Mostrar o conteúdo raw (como texto, não como HTML)
        document.getElementById('raw-output').textContent = rawContent;

        // Sanitizar com DOMPurify e renderizar
        const sanitized = DOMPurify.sanitize(rawContent);
        document.getElementById('sanitized-output').innerHTML = sanitized;

        document.getElementById('result').style.display = 'block';

      } catch (e) {
        errEl.textContent = 'Erro de ligação ao servidor. Confirma que o servidor está a correr.';
        errEl.style.display = 'block';
      }
    }
  </script>

</body>
</html>
